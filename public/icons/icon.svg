<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- SpeedUndo brand mark: RX (cyan, short) + TX (violet, tall) bars on the dark
       instrument surface. Master icon — favicons and PNGs derive from this. -->
